name: CI and Posit Connect Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != pull_request && github.ref == refs/heads/main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deployment tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install rsconnect-python

      - name: Deploy Shiny app to Posit Connect
        env:
          POSIT_CONNECT_SERVER: ${{ secrets.POSIT_CONNECT_SERVER }}
          POSIT_CONNECT_API_KEY: ${{ secrets.POSIT_CONNECT_API_KEY }}
          POSIT_CONNECT_SHINY_APP_ID: ${{ secrets.POSIT_CONNECT_SHINY_APP_ID }}
          POSIT_CONNECT_SHINY_TITLE: ${{ vars.POSIT_CONNECT_SHINY_TITLE }}
        run: |
          set -euo pipefail

          if [ -z "${POSIT_CONNECT_SERVER:-}" ] || [ -z "${POSIT_CONNECT_API_KEY:-}" ]; then
            echo "Missing required secrets: POSIT_CONNECT_SERVER / POSIT_CONNECT_API_KEY"
            exit 1
          fi

          title="${POSIT_CONNECT_SHINY_TITLE:-Seismic Intel Hub}"

          if [ -n "${POSIT_CONNECT_SHINY_APP_ID:-}" ]; then
            rsconnect deploy shiny . \
              --server "$POSIT_CONNECT_SERVER" \
              --api-key "$POSIT_CONNECT_API_KEY" \
              --entrypoint shiny_app:app \
              --title "$title" \
              --app-id "$POSIT_CONNECT_SHINY_APP_ID"
          else
            rsconnect deploy shiny . \
              --server "$POSIT_CONNECT_SERVER" \
              --api-key "$POSIT_CONNECT_API_KEY" \
              --entrypoint shiny_app:app \
              --title "$title"
          fi
