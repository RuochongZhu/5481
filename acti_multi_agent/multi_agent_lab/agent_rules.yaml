rules:
  literature_scout:
  - id: "lit-scout-precision"
    name: "Literature Scout Rules"
    description: "Ensures literature review is structured, citation-accurate, and entropy-focused."
    applies_when: "Always"
    guidance: |
      # Literature Scout Guidelines

      **1. Output Format:**
      - Use strict markdown headers exactly as specified
      - Literature table must have exactly 6 rows with | # | Paper | Key Finding |
      - Every claim must trace to a specific paper

      **2. Data Anchors:**
      - 2-gram entropy: AI = 3.119 bits, Human = 3.883 bits (Widjaja et al. 2023)
      - Variance formula: Var(X_j^n) = σ²(1 + n/M) (Shumailov et al. 2024)
      - Always state the 20% entropy gap explicitly

      **3. Coherence:**
      - End with a clear research gap statement
      - The gap must motivate a physically-verified data platform
      - Do NOT fabricate citations beyond the 6 listed papers

      **4. Constraints:**
      - Maximum 800 words
      - No filler or generic AI safety disclaimers

  quantitative_analyst:
  - id: "quant-analyst-precision"
    name: "Quantitative Analyst Rules"
    description: "Ensures mathematical framework is rigorous, well-defined, and traceable to literature."
    applies_when: "Always"
    guidance: |
      # Quantitative Analyst Guidelines

      **1. Output Format:**
      - Present L_auth formula in a code block for clarity
      - Metrics table must have exactly 6 rows with | # | Metric | Symbol | Target | Meaning |
      - Each formula must include variable definitions

      **2. Mathematical Rigor:**
      - Derive H_n ≈ H_0 − (n / 2M) · ln(2πeσ²) from the variance formula
      - Explain why entropy loss is linear in n and inversely proportional to M
      - Default weights: λ₁ = 0.4, λ₂ = 0.35, λ₃ = 0.25

      **3. Coherence:**
      - Reference specific numbers from Agent 1 (3.119/3.883 bits, 20% gap)
      - Bridge to Agent 3 by identifying physical-world anchoring as strongest guarantee
      - Classify metrics into information-theoretic vs physical-verification

      **4. Constraints:**
      - Maximum 600 words
      - No hand-waving; every claim needs a formula or citation

  solution_architect:
  - id: "solution-architect-precision"
    name: "Solution Architect Rules"
    description: "Ensures platform mapping is concrete, metric-linked, and evidence-based."
    applies_when: "Always"
    guidance: |
      # Solution Architect Guidelines

      **1. Output Format:**
      - Feature mapping table: exactly 6 rows with | # | Feature | Component | Metric | How It Helps |
      - Use actual Vue component filenames (e.g., ActivityCheckinModal.vue)
      - Present A_score formula with weight justification

      **2. Evidence Standards:**
      - Every feature must link to a specific metric symbol (D_KL, ΔH, V_tail, R_geo, T_fresh, S_corr)
      - Reference Agent 1 literature findings by author name
      - Reference Agent 2 metric targets by numerical value

      **3. Anti-Algorithmic Analysis:**
      - Contrast with engagement-optimized platforms explicitly
      - Connect each design choice to a specific feedback loop from Agent 1
      - Explain why absence of algorithms preserves entropy

      **4. Constraints:**
      - Maximum 800 words
      - Include current dev status (138 commits, live deployment, team size)
      - No speculative features; only what is currently implemented
